name: Scene Visual Mapping

on:
  push:
    paths:
      - .github/workflows/scene-visual-mapping.yml
      - data/manuscript.json
      - data/scenes.json
      - data/visual-assets.json
      - data/interstitials/earned-catalogue-first-movement.json
      - canonical/theorem_zero_canonical_substrate_v1_0_final.html
  workflow_dispatch:

permissions:
  contents: write

jobs:
  map-scenes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Generate scene visual mapping
        run: |
          python - <<'PY'
          import json, hashlib, re, math
          from pathlib import Path
          from collections import Counter, defaultdict

          ROOT = Path('.')
          manuscript_path = ROOT / 'data/manuscript.json'
          scenes_path = ROOT / 'data/scenes.json'
          assets_path = ROOT / 'data/visual-assets.json'
          interstitial_path = ROOT / 'data/interstitials/earned-catalogue-first-movement.json'
          canonical_path = ROOT / 'canonical/theorem_zero_canonical_substrate_v1_0_final.html'
          mapping_path = ROOT / 'data/scene-visual-mapping.json'
          report_path = ROOT / 'docs/scene-visual-mapping-report.md'

          EXPECTED_CANONICAL_SHA = '9c8085212c2672780aae5249481826e3e4d14b7cecf65e12e5d060df537e5837'
          STOPWORDS = set('a an and are as at be but by can centre chapter construction do does each for from has have in into is it its later may not now of on one or own part point points relation same six so than that the their them then these this through to two unit was were what when where while with without yet'.split())

          def load_json(path):
              with path.open('r', encoding='utf-8') as f:
                  return json.load(f)

          def dump_json(path, obj):
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(json.dumps(obj, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          def sha256(path):
              return hashlib.sha256(path.read_bytes()).hexdigest()

          def words(text):
              return [w for w in re.findall(r'[A-Za-z0-9√]+', (text or '').lower()) if len(w) > 1 and w not in STOPWORDS]

          def summary_overlap(summary, text):
              s = words(summary)
              if not s:
                  return 0.0
              t = set(words(text))
              return sum(1 for w in s if w in t) / len(s)

          def part_label(part_id):
              if part_id == 'part_one':
                  return 'Part One'
              if part_id == 'part_two':
                  return 'Part Two'
              return part_id or ''

          def normal_chapter(s):
              return re.sub(r'[^a-z0-9]+', ' ', (s or '').lower()).strip()

          def chapter_compatible(asset_chapter, source_chapter, source_chapter_number):
              ac = normal_chapter(asset_chapter)
              sc = normal_chapter(source_chapter)
              if not ac or not sc:
                  return False
              if ac == sc or ac in sc or sc in ac:
                  return True
              if source_chapter_number == 1 and 'opening table' in ac:
                  return True
              return False

          manuscript = load_json(manuscript_path)
          scenes_doc = load_json(scenes_path)
          assets_doc = load_json(assets_path)
          interstitial = load_json(interstitial_path)

          if sha256(canonical_path) != EXPECTED_CANONICAL_SHA:
              raise SystemExit('Canonical substrate SHA-256 mismatch; stopping without mapping.')
          assets = assets_doc.get('assets', [])
          if not assets or assets[0].get('visual_id') != 'V001_first_radius_sweep':
              raise SystemExit('Complete visual registry is not present or does not begin with V001_first_radius_sweep; stopping without mapping.')

          asset_ids = {a.get('visual_id') for a in assets}
          occurrence_rows = []
          for asset in assets:
              refs = asset.get('occurrence_refs') or []
              for idx, ref in enumerate(refs, start=1):
                  occurrence_rows.append({
                      'visual_id': asset.get('visual_id'),
                      'build_tier': asset.get('build_tier'),
                      'visual_occurrence_global_no': ref.get('global_no'),
                      'visual_occurrence_ref': ref.get('paragraph_ref'),
                      'chapter': ref.get('chapter') or (asset.get('chapters') or [None])[0],
                      'summary': ref.get('summary') or asset.get('canonical_summary'),
                      'status': asset.get('status'),
                      'occurrence_index': idx,
                      'part': ref.get('part') or ((asset.get('parts') or [None])[0]),
                      'asset_priority': bool(asset.get('priority') or asset.get('is_priority') or asset.get('priority_visual') or asset.get('priority_visual_id') or asset.get('build_priority') == 'priority')
                  })
          occurrence_by_global = defaultdict(list)
          for row in occurrence_rows:
              if row['visual_occurrence_global_no'] is not None:
                  occurrence_by_global[row['visual_occurrence_global_no']].append(row)

          blocks = []
          for part in manuscript.get('parts', []):
              for chapter in part.get('chapters', []):
                  for block in chapter.get('blocks', []):
                      rec = dict(block)
                      rec.setdefault('chapter_title', chapter.get('title') or block.get('chapter_title'))
                      rec.setdefault('part_title', part.get('title') or block.get('part_title'))
                      blocks.append(rec)
          block_by_id = {b.get('block_id'): b for b in blocks}

          scenes = scenes_doc.get('scenes', [])
          used_occurrence_keys = set()
          mappings = []
          manual_review = []
          unmapped = []
          nonvisual_types = {'equation_block', 'aphorism', 'transition'}

          def occurrence_key(row):
              return (row.get('visual_id'), row.get('visual_occurrence_global_no'), row.get('occurrence_index'))

          def choose_occurrence(block):
              candidates = list(occurrence_by_global.get(block.get('global_index'), []))
              compatible = []
              for row in candidates:
                  same_part = (row.get('part') == part_label(block.get('part_id')))
                  same_chapter = chapter_compatible(row.get('chapter'), block.get('chapter_title'), block.get('chapter_number'))
                  score = summary_overlap(row.get('summary'), block.get('text'))
                  compatible.append((same_part, same_chapter, score, row))
              good = [x for x in compatible if x[0] and (x[1] or block.get('chapter_number') == 1)]
              if good:
                  good.sort(key=lambda x: (x[2], x[1]), reverse=True)
                  same_part, same_chapter, score, row = good[0]
                  if score >= 0.42:
                      return row, 'mapped_high_confidence', round(0.94 + min(score, 1) * 0.05, 3), 'chapter_order_and_summary_match', score
                  if score >= 0.25:
                      return row, 'mapped_medium_confidence', round(0.72 + score * 0.18, 3), 'chapter_order_and_summary_match', score
                  return row, 'manual_review', round(0.48 + score * 0.2, 3), 'global_order_candidate_low_summary_overlap', score
              if candidates:
                  row = candidates[0]
                  score = summary_overlap(row.get('summary'), block.get('text'))
                  return row, 'manual_review', round(0.40 + score * 0.2, 3), 'global_order_candidate_part_or_chapter_drift', score

              # fallback: semantic candidate within same part/chapter, not already consumed
              best = None
              for row in occurrence_rows:
                  if occurrence_key(row) in used_occurrence_keys:
                      continue
                  if row.get('part') != part_label(block.get('part_id')):
                      continue
                  if not chapter_compatible(row.get('chapter'), block.get('chapter_title'), block.get('chapter_number')):
                      continue
                  drift = abs((row.get('visual_occurrence_global_no') or 10**9) - (block.get('global_index') or 0))
                  score = summary_overlap(row.get('summary'), block.get('text'))
                  rank = (score, -drift)
                  if best is None or rank > best[0]:
                      best = (rank, row, score, drift)
              if best and best[2] >= 0.50 and best[3] <= 3:
                  return best[1], 'mapped_medium_confidence', round(0.68 + best[2] * 0.16, 3), 'nearby_chapter_summary_match', best[2]
              return None, 'unmapped', 0.0, 'no_credible_visual_occurrence', 0.0

          for i, scene in enumerate(scenes):
              sid = scene.get('scene_id')
              source_id = scene.get('source_block_id')
              scene_type = scene.get('scene_type')
              block = block_by_id.get(source_id)
              if sid == 'scene-earned-catalogue-first-movement' or scene_type == 'ledger_table':
                  scene.update({
                      'visual_id': None,
                      'visual_mapping_status': 'special_scene',
                      'visual_bearing': True,
                      'rendering_mode': 'static_table_with_optional_row_focus',
                      'notes': 'Earned catalogue interstitial preserved as a special ledger-table scene; not forced into Visual-ID mapping.'
                  })
                  mappings.append({
                      'scene_id': sid,
                      'source_block_id': source_id,
                      'source_type': scene_type,
                      'source_global_index': None,
                      'source_chapter_title': None,
                      'visual_id': None,
                      'visual_occurrence_global_no': None,
                      'visual_occurrence_ref': None,
                      'mapping_status': 'special_scene',
                      'mapping_confidence': 1.0,
                      'mapping_method': 'interstitial_special_case',
                      'reason': 'Ledger table remains a static special scene between Chapter Ten and Chapter Eleven.'
                  })
                  continue

              if scene_type in nonvisual_types or (block and block.get('type') in nonvisual_types):
                  scene.update({
                      'visual_id': None,
                      'visual_mapping_status': 'inline_only',
                      'visual_bearing': False,
                      'rendering_mode': 'inline_text_block' if scene_type != 'equation_block' else 'inline_equation_block',
                      'notes': 'Non-visual source block preserved inline; no Visual ID assigned.'
                  })
                  mappings.append({
                      'scene_id': sid,
                      'source_block_id': source_id,
                      'source_type': block.get('type') if block else scene_type,
                      'source_global_index': block.get('global_index') if block else None,
                      'source_chapter_title': block.get('chapter_title') if block else None,
                      'visual_id': None,
                      'visual_occurrence_global_no': None,
                      'visual_occurrence_ref': None,
                      'mapping_status': 'inline_only',
                      'mapping_confidence': 1.0,
                      'mapping_method': 'non_visual_source_type',
                      'reason': 'Equation, aphorism, or transition block kept as inline manuscript content.'
                  })
                  continue

              if not block:
                  scene.update({
                      'visual_id': None,
                      'visual_mapping_status': 'unmapped',
                      'visual_bearing': bool(scene.get('visual_bearing')),
                      'rendering_mode': 'manual_review_required',
                      'notes': 'No matching source block was found in manuscript.json.'
                  })
                  rec = {
                      'scene_id': sid,
                      'source_block_id': source_id,
                      'source_type': scene_type,
                      'source_global_index': None,
                      'source_chapter_title': None,
                      'visual_id': None,
                      'visual_occurrence_global_no': None,
                      'visual_occurrence_ref': None,
                      'mapping_status': 'unmapped',
                      'mapping_confidence': 0.0,
                      'mapping_method': 'missing_source_block',
                      'reason': 'Source block ID was absent from manuscript.json.'
                  }
                  mappings.append(rec); unmapped.append(rec)
                  continue

              row, status, conf, method, overlap = choose_occurrence(block)
              if row and status in {'mapped_high_confidence', 'mapped_medium_confidence', 'manual_review'}:
                  scene.update({
                      'visual_id': row.get('visual_id') if status != 'manual_review' else row.get('visual_id'),
                      'visual_occurrence_global_no': row.get('visual_occurrence_global_no'),
                      'visual_occurrence_ref': row.get('visual_occurrence_ref'),
                      'visual_occurrence_index': row.get('occurrence_index'),
                      'visual_mapping_status': status,
                      'mapping_confidence': conf,
                      'mapping_method': method,
                      'visual_bearing': True,
                      'rendering_mode': 'visual_asset_runtime' if status != 'manual_review' else 'manual_review_required',
                      'notes': f"Mapped to complete visual asset catalogue occurrence global {row.get('visual_occurrence_global_no')} with summary-overlap {overlap:.2f}." if status != 'manual_review' else f"Candidate Visual ID requires manual review; summary-overlap {overlap:.2f}."
                  })
                  key = occurrence_key(row)
                  used_occurrence_keys.add(key)
                  rec = {
                      'scene_id': sid,
                      'source_block_id': source_id,
                      'source_type': block.get('type'),
                      'source_global_index': block.get('global_index'),
                      'source_chapter_title': block.get('chapter_title'),
                      'visual_id': row.get('visual_id'),
                      'visual_occurrence_global_no': row.get('visual_occurrence_global_no'),
                      'visual_occurrence_ref': row.get('visual_occurrence_ref'),
                      'mapping_status': status,
                      'mapping_confidence': conf,
                      'mapping_method': method,
                      'reason': f"Part/chapter/order candidate selected; registry summary overlap={overlap:.2f}."
                  }
                  mappings.append(rec)
                  if status == 'manual_review':
                      manual_review.append(rec)
              else:
                  scene.update({
                      'visual_id': None,
                      'visual_mapping_status': 'unmapped',
                      'visual_bearing': True,
                      'rendering_mode': 'manual_review_required',
                      'notes': 'No credible existing Visual ID occurrence found. No new Visual ID invented.'
                  })
                  rec = {
                      'scene_id': sid,
                      'source_block_id': source_id,
                      'source_type': block.get('type'),
                      'source_global_index': block.get('global_index'),
                      'source_chapter_title': block.get('chapter_title'),
                      'visual_id': None,
                      'visual_occurrence_global_no': None,
                      'visual_occurrence_ref': None,
                      'mapping_status': 'unmapped',
                      'mapping_confidence': 0.0,
                      'mapping_method': method,
                      'reason': 'No existing registry occurrence satisfied conservative matching constraints.'
                  }
                  mappings.append(rec); unmapped.append(rec)

          # Validation and counts
          statuses = Counter(s.get('visual_mapping_status') for s in scenes)
          scene_types = Counter(s.get('scene_type') for s in scenes)
          visual_bearing_true = sum(1 for s in scenes if s.get('visual_bearing') is True)
          visual_bearing_false = sum(1 for s in scenes if s.get('visual_bearing') is False)
          mapped_ids = [s.get('visual_id') for s in scenes if s.get('visual_id')]
          absent = sorted(set(mapped_ids) - asset_ids)
          if absent:
              raise SystemExit('Mapped visual_id absent from visual-assets.json: ' + ', '.join(absent))
          if any('visual_mapping_status' not in s for s in scenes):
              raise SystemExit('Every scene must have visual_mapping_status.')
          if any('visual_bearing' not in s for s in scenes):
              raise SystemExit('Every scene must have visual_bearing.')
          ledger_scenes = [s for s in scenes if s.get('scene_id') == 'scene-earned-catalogue-first-movement']
          if len(ledger_scenes) != 1 or ledger_scenes[0].get('visual_mapping_status') != 'special_scene':
              raise SystemExit('Ledger table special scene validation failed.')
          if sha256(canonical_path) != EXPECTED_CANONICAL_SHA:
              raise SystemExit('Canonical substrate SHA-256 changed during mapping.')

          used_registry_rows = len(used_occurrence_keys)
          unused_rows = [r for r in occurrence_rows if occurrence_key(r) not in used_occurrence_keys]
          reused_visual_ids = sum(1 for a in assets if (a.get('occurrence_count') or len(a.get('occurrence_refs') or [])) > 1)
          represented_reused_visual_ids = len({s.get('visual_id') for s in scenes if s.get('visual_id') and next((a for a in assets if a.get('visual_id') == s.get('visual_id') and ((a.get('occurrence_count') or len(a.get('occurrence_refs') or [])) > 1)), None)})
          priority_asset_ids = {a.get('visual_id') for a in assets if bool(a.get('priority') or a.get('is_priority') or a.get('priority_visual') or a.get('priority_visual_id') or a.get('build_priority') == 'priority')}
          represented_priority_ids = len(priority_asset_ids & set(mapped_ids))

          counts = {
              'total_scenes': len(scenes),
              'scene_types': dict(scene_types),
              'visual_bearing_true': visual_bearing_true,
              'visual_bearing_false': visual_bearing_false,
              'mapped_high_confidence': statuses.get('mapped_high_confidence', 0),
              'mapped_medium_confidence': statuses.get('mapped_medium_confidence', 0),
              'attached_to_nearest_visual': statuses.get('attached_to_nearest_visual', 0),
              'inline_only': statuses.get('inline_only', 0),
              'manual_review': statuses.get('manual_review', 0),
              'unmapped': statuses.get('unmapped', 0),
              'special_scene': statuses.get('special_scene', 0),
              'registry_occurrence_rows_total': len(occurrence_rows),
              'registry_occurrence_rows_used': used_registry_rows,
              'registry_occurrence_rows_not_used': len(unused_rows),
              'visual_ids_total': len(asset_ids),
              'mapped_visual_ids_unique': len(set(mapped_ids)),
              'reused_visual_ids_total': reused_visual_ids,
              'reused_visual_ids_represented': represented_reused_visual_ids,
              'priority_visual_ids_total_detected': len(priority_asset_ids),
              'priority_visual_ids_represented': represented_priority_ids,
              'canonical_substrate_sha256': sha256(canonical_path)
          }

          mapping_doc = {
              'title': 'Theorem Zero Scene to Visual ID Mapping',
              'version': 'scene-visual-mapping-v1',
              'inputs': {
                  'manuscript': 'data/manuscript.json',
                  'scenes': 'data/scenes.json',
                  'visual_assets': 'data/visual-assets.json',
                  'interstitial': 'data/interstitials/earned-catalogue-first-movement.json',
                  'canonical_substrate': 'canonical/theorem_zero_canonical_substrate_v1_0_final.html'
              },
              'counts': counts,
              'mappings': mappings,
              'manual_review': manual_review,
              'unmapped': unmapped,
              'unused_registry_occurrences': unused_rows
          }

          scenes_doc['version'] = 'scene-manifest-v1-mapped'
          scenes_doc['mapping'] = {
              'version': 'scene-visual-mapping-v1',
              'source': 'data/scene-visual-mapping.json',
              'method': 'conservative chapter/order/summary matching against complete visual asset occurrence rows',
              'canonical_substrate_sha256': EXPECTED_CANONICAL_SHA
          }

          dump_json(scenes_path, scenes_doc)
          dump_json(mapping_path, mapping_doc)

          def md_case_list(items):
              if not items:
                  return 'None.\n'
              lines = []
              for item in items:
                  lines.append(f"- `{item.get('scene_id')}` / `{item.get('source_block_id')}` / source global `{item.get('source_global_index')}` / candidate `{item.get('visual_id')}` / {item.get('reason')}")
              return '\n'.join(lines) + '\n'

          report = f"""# Theorem Zero Scene-to-Visual-ID Mapping Report

## Input files used

- `data/manuscript.json`
- `data/scenes.json`
- `data/visual-assets.json`
- `data/interstitials/earned-catalogue-first-movement.json`
- `canonical/theorem_zero_canonical_substrate_v1_0_final.html`

## Validation checks performed

- Parsed `data/manuscript.json` as JSON.
- Parsed `data/scenes.json` as JSON.
- Parsed `data/visual-assets.json` as JSON.
- Confirmed `data/visual-assets.json` begins with `V001_first_radius_sweep`.
- Expanded registry `occurrence_refs` into occurrence rows.
- Flattened manuscript blocks while preserving source IDs and chapter metadata.
- Mapped only to existing registry Visual IDs.
- Preserved equation, aphorism, and transition scenes as inline-only non-visual scenes.
- Preserved `scene-earned-catalogue-first-movement` as a special ledger-table scene.
- Confirmed every scene has `visual_mapping_status`.
- Confirmed every scene has `visual_bearing`.
- Confirmed no mapped `visual_id` is absent from `data/visual-assets.json`.
- Confirmed no new Visual IDs were invented.
- Confirmed canonical substrate SHA-256 remains `{EXPECTED_CANONICAL_SHA}`.

## Counts

| Measure | Count |
|---|---:|
| Total scenes | {counts['total_scenes']} |
| Total visual-bearing scenes | {counts['visual_bearing_true']} |
| Total non-visual scenes | {counts['visual_bearing_false']} |
| Mapped high-confidence scenes | {counts['mapped_high_confidence']} |
| Mapped medium-confidence scenes | {counts['mapped_medium_confidence']} |
| Attached non-visual scenes | {counts['attached_to_nearest_visual']} |
| Inline-only scenes | {counts['inline_only']} |
| Manual-review scenes | {counts['manual_review']} |
| Unmapped scenes | {counts['unmapped']} |
| Special scenes | {counts['special_scene']} |
| Registry occurrence rows used | {counts['registry_occurrence_rows_used']} |
| Registry occurrence rows not used | {counts['registry_occurrence_rows_not_used']} |
| Total registry occurrence rows | {counts['registry_occurrence_rows_total']} |
| Total reused Visual IDs represented | {counts['reused_visual_ids_represented']} |
| Total reused Visual IDs in registry | {counts['reused_visual_ids_total']} |
| Total priority Visual IDs represented | {counts['priority_visual_ids_represented']} |
| Total priority Visual IDs detected | {counts['priority_visual_ids_total_detected']} |

## Manual-review cases

{md_case_list(manual_review)}
## Unmapped cases

{md_case_list(unmapped)}
## Confirmations

No new Visual IDs were invented. All mapped scenes reference existing Visual IDs from `data/visual-assets.json`.

The canonical substrate was not modified. Its SHA-256 after mapping is `{EXPECTED_CANONICAL_SHA}`.

The earned catalogue interstitial remains `special_scene` with `rendering_mode: static_table_with_optional_row_focus`.
"""
          report_path.parent.mkdir(parents=True, exist_ok=True)
          report_path.write_text(report, encoding='utf-8')

          # Final JSON syntax validation from disk.
          load_json(scenes_path)
          load_json(mapping_path)
          print(json.dumps(counts, indent=2))
          PY
      - name: Commit generated mapping outputs
        run: |
          git config user.name "theorem-zero-mapper"
          git config user.email "actions@github.com"
          git add data/scenes.json data/scene-visual-mapping.json docs/scene-visual-mapping-report.md
          if git diff --cached --quiet; then
            echo "No mapping changes to commit."
          else
            git commit -m "Map scenes to visual asset registry"
            git push
          fi
